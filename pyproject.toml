[project]
name = "dissertationresearch"
version = "0.1.0"
description = ""
authors = [
    {name = "Qwelice",email = "Qwelice@yandex.ru"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "torch (==2.4.0)",
    "torchvision (==0.19.0)",
    "torchaudio (==2.4.0)",
    "numpy (<2)",
    "setuptools (>=75.8.1,<76.0.0)",
    "open3d (>=0.19.0,<0.20.0)",
    "pytorch-lightning (>=2.5.0.post0,<3.0.0)",
    "tensorboard (>=2.19.0,<3.0.0)"
]

[tool.poetry]
package-mode = false

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[[tool.poetry.source]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu124"
priority = "explicit"


[tool.poetry.dependencies]
torch = {source = "pytorch"}
torchvision = {source = "pytorch"}
torchaudio = {source = "pytorch"}
